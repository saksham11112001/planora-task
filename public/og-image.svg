<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect width="1200" height="630" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>
  <!-- Logo block -->
  <rect x="80" y="80" width="80" height="80" rx="20" fill="#0d9488"/>
  <text x="120" y="136" font-family="system-ui,sans-serif" font-size="38" font-weight="800" fill="white" text-anchor="middle">uF</text>
  <!-- Brand name -->
  <text x="184" y="140" font-family="system-ui,sans-serif" font-size="48" font-weight="800" fill="#0d9488">upFloat</text>
  <!-- Tagline -->
  <text x="80" y="240" font-family="system-ui,sans-serif" font-size="52" font-weight="700" fill="#0f172a">Practice Management</text>
  <text x="80" y="306" font-family="system-ui,sans-serif" font-size="52" font-weight="700" fill="#0f172a">for CA Firms &amp; MSMEs</text>
  <!-- Sub-description -->
  <text x="80" y="388" font-family="system-ui,sans-serif" font-size="28" fill="#475569">Track compliance · Manage teams · Automate recurring tasks</text>
  <!-- Bottom badge -->
  <rect x="80" y="480" width="320" height="56" rx="28" fill="#0d9488"/>
  <text x="240" y="515" font-family="system-ui,sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">upfloat.co</text>
  <!-- Decorative circles -->
  <circle cx="1100" cy="120" r="160" fill="#0d9488" opacity="0.06"/>
  <circle cx="1050" cy="520" r="120" fill="#0e7490" opacity="0.06"/>
</svg>
